run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - unused
    - ineffassign
    - gosimple
    - gofmt
    - goimports
    - revive
    - bodyclose
    - sqlclosecheck
    - unconvert

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: false

issues:
  exclude-dirs:
    - tests
  max-issues-per-linter: 0
  max-same-issues: 0
