name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.25"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run unit tests
        run: go test -short -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  integration-tests:
    runs-on: ubuntu-latest
    needs: lint
    # testcontainers-go talks to the Docker daemon directly — already available
    # on GitHub-hosted ubuntu-latest runners, no services: block needed.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run integration tests
        run: |
          if [ -d tests ]; then
            go test ./tests/...
          else
            echo "No integration tests found. Skipping."
          fi

  build:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build binary
        run: go build -o bin/a-sync-backend ./cmd/api
      - name: Build Docker image (no push yet)
        run: docker build -t a-sync-backend:${{ github.sha }} .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    # Only deploy on version tags (v0.1-core-loop, v0.2-reliability, ...),
    # matching the "tag a release per phase" convention from the PRD.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
